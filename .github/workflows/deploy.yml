script: |
          # Masuk ke direktori atau clone kalau belum ada
          if [ ! -d "Med-Queue" ]; then
            git clone https://github.com/${{ github.repository }} Med-Queue
          fi
          cd Med-Queue
          
          # Tarik perubahan terbaru
          git pull origin main

          # Buat file .env dari secrets (Hati-hati: jangan ada spasi di awal baris EOF)
          cat > .env << EOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORT=3000
          EOF

          # Rebuild dan Restart pake Docker Compose (lebih sakti)
          # Kalau kamu tetep mau pake docker run manual, pastikan nama container unik
          sudo docker stop Med-Queue-app || true
          sudo docker rm Med-Queue-app || true
          sudo docker build -t med-queue-img .
          sudo docker run -d --name Med-Queue-app -p 3000:3000 --env-file .env med-queue-img

          echo "✅ Deploy berhasil!"